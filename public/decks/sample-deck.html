<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sample Deck</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Georgia', serif;
    background: #1F1D17;
    color: #F5EFE4;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .slide { max-width: 40rem; }
  h1 { font-size: clamp(2rem, 6vw, 4rem); letter-spacing: -0.03em; margin-bottom: 1rem; }
  p { font-size: 1.1rem; line-height: 1.6; color: #C8BEA8; }
  .tag { text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.7rem; color: #7A8B6E; margin-bottom: 1.5rem; }
</style>
</head>
<body>
  <div class="slide">
    <p class="tag">Sample Deck</p>
    <h1>This is a standalone HTML deck.</h1>
    <p>Replace this file with your own deck in <code>public/decks/</code>, or upload one through the Presentations editor. It renders exactly as built, embedded here or opened fullscreen.</p>
  </div>
</body>
</html>
