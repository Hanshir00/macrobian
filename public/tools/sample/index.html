<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sample tool — reconstitution calculator</title>
  <style>
    :root { --ink:#1a1a18; --muted:#7c7c76; --line:#d9d7d1; --accent:#DA3A2C; --bg:#f6f5f2; }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink); background: var(--bg);
      padding: 1.25rem; line-height: 1.5;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 1.05rem; margin: 0 0 0.25rem; letter-spacing: -0.01em; }
    .sub { margin: 0 0 1.25rem; font-size: 0.82rem; color: var(--muted); }
    .grid { display: grid; gap: 0.9rem; }
    @media (min-width: 440px) { .grid { grid-template-columns: 1fr 1fr; } }
    label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.3rem; }
    input {
      width: 100%; padding: 0.6rem 0.7rem; font-size: 1rem;
      border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink);
    }
    input:focus { outline: 2px solid color-mix(in srgb, var(--accent) 40%, transparent); outline-offset: 1px; }
    .out {
      margin-top: 1.25rem; padding: 1rem; background: #fff;
      border: 1px solid var(--line); border-radius: 8px;
    }
    .row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.45rem 0; border-bottom: 1px solid var(--line); }
    .row:last-child { border-bottom: 0; }
    .row span { font-size: 0.82rem; color: var(--muted); }
    .row strong { font-size: 1.1rem; font-variant-numeric: tabular-nums; }
    .accent { color: var(--accent); }
    .note { margin-top: 1rem; font-size: 0.72rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Reconstitution calculator <span class="accent">(sample)</span></h1>
    <p class="sub">A template tool. Replace this file with your own — the embed sizes itself to whatever you build.</p>

    <div class="grid">
      <div>
        <label for="mg">Amount in vial (mg)</label>
        <input id="mg" type="number" inputmode="decimal" value="5" min="0" step="any" />
      </div>
      <div>
        <label for="ml">Water added (mL)</label>
        <input id="ml" type="number" inputmode="decimal" value="2" min="0" step="any" />
      </div>
      <div>
        <label for="dose">Desired dose (mcg)</label>
        <input id="dose" type="number" inputmode="decimal" value="250" min="0" step="any" />
      </div>
    </div>

    <div class="out" id="out"></div>
    <p class="note">Illustrative arithmetic only — not medical or dosing advice.</p>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    function calc() {
      const mg = parseFloat($('mg').value) || 0;
      const ml = parseFloat($('ml').value) || 0;
      const dose = parseFloat($('dose').value) || 0;
      const concMcgPerMl = ml > 0 ? (mg * 1000) / ml : 0;
      const drawMl = concMcgPerMl > 0 ? dose / concMcgPerMl : 0;
      const units = drawMl * 100; // U-100 insulin syringe units
      $('out').innerHTML = `
        <div class="row"><span>Concentration</span><strong>${concMcgPerMl ? concMcgPerMl.toFixed(0) : '—'} mcg/mL</strong></div>
        <div class="row"><span>Volume to draw</span><strong>${drawMl ? drawMl.toFixed(3) : '—'} mL</strong></div>
        <div class="row"><span>On a U-100 syringe</span><strong class="accent">${units ? units.toFixed(1) : '—'} units</strong></div>`;
    }
    ['mg', 'ml', 'dose'].forEach((id) => $(id).addEventListener('input', calc));
    calc();
  </script>
</body>
</html>
