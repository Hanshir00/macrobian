<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Peptide Calculator — Tactile (Silver)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#c7cbd0;--surface:#ffffff;--surface-2:#eef0f2;
    --line:rgba(20,28,38,.12);--text:#161b21;--muted:#5e6772;--faint:#9aa3ad;
    --accent:#0d9488;--accent-dim:#0d9488;--warn:#cf4436;
    --shadow:0 1px 2px rgba(20,28,38,.06),0 8px 22px rgba(20,28,38,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);font-family:"Space Grotesk",system-ui,sans-serif}
  body{min-height:100%;padding:20px 16px 26px;
    background:
      radial-gradient(120% 60% at 50% -10%, rgba(255,255,255,.85), transparent 55%),
      linear-gradient(168deg,#e2e5e9 0%, #cfd3d8 52%, #bfc3c9 100%);}
  .wrap{max-width:420px;margin:0 auto}
  .head{display:flex;align-items:center;gap:9px;margin-bottom:16px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .head h1{font-size:15px;font-weight:600}
  .head span{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--faint);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-top:1px}

  /* instrument */
  .inst{background:linear-gradient(180deg,#fdfdfe,#eef0f3);border:1px solid var(--line);border-radius:22px;padding:18px 16px 14px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.9)}
  .inst-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px}
  .inst-top .glbl{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
  .iu{display:flex;align-items:baseline;gap:6px}
  .iu b{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:52px;line-height:.85;color:var(--accent)}
  .iu small{font-size:15px;color:var(--muted);font-weight:500}
  .meta{text-align:right;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);line-height:1.7}
  .meta b{color:var(--text);font-weight:500}
  .syr-horz{width:100%;height:auto;display:block;margin-top:2px}
  .cap-note{display:none;align-items:center;gap:6px;margin-top:10px;font-size:11.5px;color:var(--warn);font-weight:500}
  .cap-note.on{display:flex}

  /* stepper rows */
  .list{display:flex;flex-direction:column;gap:10px}
  .item{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:13px 14px;box-shadow:var(--shadow)}
  .item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
  .item-head label{font-size:13.5px;color:var(--text);font-weight:500}
  .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
  .seg button{appearance:none;border:0;background:transparent;color:var(--muted);font-family:"JetBrains Mono",monospace;
    font-size:11px;font-weight:600;padding:5px 9px;border-radius:6px;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--accent);color:#fff;box-shadow:0 1px 4px rgba(13,148,136,.4)}
  .stepper{display:flex;align-items:stretch;gap:8px}
  .stepper .sbtn{flex:0 0 46px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;color:var(--text);
    font-size:24px;font-weight:500;cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center;user-select:none}
  .stepper .sbtn:active{background:var(--accent);color:#fff;border-color:transparent}
  .stepper .val{flex:1;min-width:0;position:relative;display:flex;align-items:center}
  .stepper .num{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;color:var(--text);
    font-family:"JetBrains Mono",monospace;font-size:22px;font-weight:500;text-align:center;padding:10px 38px 10px 12px;outline:none;transition:.15s}
  .stepper .num:focus{border-color:var(--accent-dim);box-shadow:0 0 0 3px rgba(46,230,214,.12)}
  .stepper .suf{position:absolute;right:13px;font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--faint);pointer-events:none}
  .foot{margin-top:16px;text-align:center;font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--faint);letter-spacing:.5px}
</style>
</head>
<body>
  <div class="wrap" data-screen-label="C · Tactile">
    <div class="head">
      <div class="dot"></div>
      <div><h1>Peptide Calculator</h1><span>Reconstitution · U-100</span></div>
    </div>

    <section class="inst">
      <div class="inst-top">
        <div>
          <div class="glbl">Draw to</div>
          <div class="iu"><b id="iu">10</b><small>IU</small></div>
        </div>
        <div class="meta">Vol <b id="vol">0.1</b> mL<br>Conc <b id="conc">2.5</b> mg/mL</div>
      </div>
      <svg class="syr-horz" id="syr" viewBox="0 0 480 104" aria-hidden="true"></svg>
      <div class="cap-note" id="capNote">⚠ Exceeds 100 IU — split the dose</div>
    </section>

    <div class="list">
      <div class="item">
        <div class="item-head">
          <label for="pep">Peptide in vial</label>
          <div class="seg" id="pepSeg"><button data-u="mg" class="on">MG</button><button data-u="mcg">MCG</button></div>
        </div>
        <div class="stepper">
          <div class="sbtn" data-t="pep" data-d="-1">−</div>
          <div class="val"><input class="num" id="pep" type="number" inputmode="decimal" value="5" min="0" step="0.5" /></div>
          <div class="sbtn" data-t="pep" data-d="1">+</div>
        </div>
      </div>

      <div class="item">
        <div class="item-head"><label for="bac">Bacteriostatic water</label></div>
        <div class="stepper">
          <div class="sbtn" data-t="bac" data-d="-1">−</div>
          <div class="val"><input class="num" id="bac" type="number" inputmode="decimal" value="2" min="0" step="0.5" /><span class="suf">mL</span></div>
          <div class="sbtn" data-t="bac" data-d="1">+</div>
        </div>
      </div>

      <div class="item">
        <div class="item-head">
          <label for="dose">Target dose</label>
          <div class="seg" id="doseSeg"><button data-u="mcg" class="on">MCG</button><button data-u="mg">MG</button></div>
        </div>
        <div class="stepper">
          <div class="sbtn" data-t="dose" data-d="-1">−</div>
          <div class="val"><input class="num" id="dose" type="number" inputmode="decimal" value="250" min="0" step="50" /></div>
          <div class="sbtn" data-t="dose" data-d="1">+</div>
        </div>
      </div>
    </div>

    <div class="foot">U-100 INSULIN SYRINGE · 1 mL = 100 IU</div>
  </div>

<script>
(function(){
  var $=function(s){return document.querySelector(s)};
  var pepU="mg",doseU="mcg";
  var NS="http://www.w3.org/2000/svg",svg=$("#syr");
  var x0=40,x1=420,w=x1-x0,by=14,bh=48;
  function ux(u){return x0+(u/100)*w}
  function el(t,a){var e=document.createElementNS(NS,t);for(var k in a)e.setAttribute(k,a[k]);return e}
  svg.appendChild(el("rect",{x:x0-22,y:by-6,width:16,height:bh+12,rx:3,fill:"#b6bcc4"}));
  svg.appendChild(el("rect",{x:x0,y:by,width:w,height:bh,rx:6,fill:"#f6f8fa",stroke:"rgba(20,28,38,.32)","stroke-width":1.5}));
  svg.appendChild(el("rect",{x:x1,y:by+bh/2-7,width:14,height:14,fill:"#b6bcc4"}));
  svg.appendChild(el("rect",{x:x1+14,y:by+bh/2-1.5,width:42,height:3,fill:"#9aa3ad"}));
  var fill=el("rect",{x:x0+2,y:by+2,width:ux(10)-x0-2,height:bh-4,rx:4,fill:"var(--accent)",opacity:.95});
  fill.style.filter="drop-shadow(0 1px 3px rgba(13,148,136,.4))";svg.appendChild(fill);
  var plung=el("rect",{x:ux(10)-1.5,y:by,width:3,height:bh,fill:"#3a4651"});svg.appendChild(plung);
  for(var u=0;u<=100;u+=2){
    var x=ux(u),major=(u%10===0);
    svg.appendChild(el("line",{x1:x,y1:by+bh,x2:x,y2:by+bh+(major?12:7),stroke:major?"rgba(20,28,38,.62)":"rgba(20,28,38,.34)","stroke-width":major?1.6:1}));
    if(major){var t=el("text",{x:x,y:by+bh+27,fill:"#454e58","font-family":"JetBrains Mono, monospace","font-size":11,"text-anchor":"middle"});t.textContent=u;svg.appendChild(t)}
  }
  var mk=el("polygon",{points:"",fill:"var(--accent)"});svg.appendChild(mk);

  function fmt(n){if(!isFinite(n))return"—";return(Math.round(n*100)/100).toString()}
  function calc(){
    var pep=parseFloat($("#pep").value)||0,bac=parseFloat($("#bac").value)||0,dose=parseFloat($("#dose").value)||0;
    var pepMcg=pepU==="mg"?pep*1000:pep,doseMcg=doseU==="mg"?dose*1000:dose;
    var conc=bac>0?pepMcg/bac:0,vol=conc>0?doseMcg/conc:0,iu=vol*100;
    $("#iu").textContent=(conc>0&&iu>0)?fmt(iu):"—";
    $("#vol").textContent=fmt(vol);$("#conc").textContent=fmt(conc/1000);
    $("#capNote").classList.toggle("on",iu>100);
    var s=Math.max(0,Math.min(100,iu));
    fill.setAttribute("width",Math.max(0,ux(s)-x0-2));plung.setAttribute("x",ux(s)-1.5);
    var mx=ux(s);mk.setAttribute("points",mx+","+(by-2)+" "+(mx-6)+","+(by-12)+" "+(mx+6)+","+(by-12));
  }
  function bindSeg(id,set){var seg=$(id);seg.addEventListener("click",function(e){var b=e.target.closest("button");if(!b)return;
    [].forEach.call(seg.querySelectorAll("button"),function(x){x.classList.remove("on")});b.classList.add("on");set(b.dataset.u);calc()})}
  bindSeg("#pepSeg",function(u){pepU=u});bindSeg("#doseSeg",function(u){doseU=u});
  ["#pep","#bac","#dose"].forEach(function(s){$(s).addEventListener("input",calc)});
  document.querySelectorAll(".sbtn").forEach(function(b){b.addEventListener("click",function(){
    var inp=$("#"+b.dataset.t),step=parseFloat(inp.step)||1,d=parseFloat(b.dataset.d);
    var v=(parseFloat(inp.value)||0)+d*step;if(v<0)v=0;
    inp.value=Math.round(v*100)/100;calc();
  })});
  calc();
})();
</script>
<script>
/* Reports content height to the parent page so the embedding iframe can auto-size. */
(function(){
  function post(){
    var h=Math.ceil(document.documentElement.getBoundingClientRect().height);
    try{parent.postMessage({type:"peptide-calc-height",height:h},"*");}catch(e){}
  }
  window.addEventListener("load",post);
  document.addEventListener("input",function(){requestAnimationFrame(post)});
  document.addEventListener("click",function(){requestAnimationFrame(post)});
  if(window.ResizeObserver){new ResizeObserver(post).observe(document.body);}
})();
</script>
</body>
</html>
