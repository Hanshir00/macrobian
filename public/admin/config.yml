# =============================================================
# Decap CMS — Sanguine Configuration
# -------------------------------------------------------------
# This file configures the visual editor at /admin. Each
# collection below mirrors a content collection in
# src/content/config.ts. When you save in the CMS, it commits
# a markdown or JSON file to your GitHub repo.
# =============================================================

backend:
  name: git-gateway
  branch: main           # change if your default branch is different
  commit_messages:
    create: 'cms: create {{collection}} "{{slug}}"'
    update: 'cms: update {{collection}} "{{slug}}"'
    delete: 'cms: delete {{collection}} "{{slug}}"'
    uploadMedia: 'cms: upload "{{path}}"'
    deleteMedia: 'cms: delete "{{path}}"'

# Local-development backend — run with `npx decap-server` in another
# terminal to edit the CMS without authentication during local dev.
# Comment out the lines below in production (or leave; they're a no-op
# unless you set the URL hash to #local).
local_backend: true

media_folder: 'public/images/uploads'
public_folder: '/images/uploads'

site_url: https://sanguine.example.com
display_url: https://sanguine.example.com
logo_url: https://sanguine.example.com/favicon.svg

# Open editorial workflow — enables drafts and review (recommended)
publish_mode: editorial_workflow

collections:
  # =====================================================
  # PEPTIDES
  # =====================================================
  - name: 'peptides'
    label: 'Peptides'
    label_singular: 'Peptide'
    folder: 'src/content/peptides'
    create: true
    slug: '{{slug}}'
    extension: 'md'
    format: 'frontmatter'
    summary: '{{title}} — {{category}}'
    fields:
      - { name: title,       label: 'Title',          widget: string }
      - { name: summary,     label: 'Summary',        widget: text, hint: '1–2 sentence overview shown on the index page.' }
      - { name: category,    label: 'Category',       widget: string, required: false, hint: 'e.g. Healing, Cognitive, Performance' }
      - name: aliases
        label: 'Aliases'
        widget: list
        required: false
        hint: 'Other names this peptide goes by.'
      - { name: publishedAt, label: 'Published',      widget: datetime, required: false, default: '' }
      - { name: updatedAt,   label: 'Updated',        widget: datetime, required: false, default: '' }
      - { name: order,       label: 'Sort Order',     widget: number, required: false, hint: 'Lower numbers appear first.' }
      - { name: image,       label: 'Image',          widget: image,  required: false }
      - { name: draft,       label: 'Draft',          widget: boolean, default: false, hint: 'Drafts are hidden from the public site.' }
      - { name: body,        label: 'Body',           widget: markdown }

  # =====================================================
  # NOOTROPICS
  # =====================================================
  - name: 'nootropics'
    label: 'Nootropics'
    label_singular: 'Nootropic'
    folder: 'src/content/nootropics'
    create: true
    slug: '{{slug}}'
    extension: 'md'
    format: 'frontmatter'
    summary: '{{title}} — {{category}}'
    fields:
      - { name: title,       label: 'Title',          widget: string }
      - { name: summary,     label: 'Summary',        widget: text }
      - { name: category,    label: 'Category',       widget: string, required: false }
      - name: aliases
        label: 'Aliases'
        widget: list
        required: false
      - { name: publishedAt, label: 'Published',      widget: datetime, required: false, default: '' }
      - { name: updatedAt,   label: 'Updated',        widget: datetime, required: false, default: '' }
      - { name: order,       label: 'Sort Order',     widget: number, required: false }
      - { name: image,       label: 'Image',          widget: image,  required: false }
      - { name: draft,       label: 'Draft',          widget: boolean, default: false }
      - { name: body,        label: 'Body',           widget: markdown }

  # =====================================================
  # REPOSITORY — TOPICS  (top level)
  # =====================================================
  - name: 'repo-topics'
    label: 'Repository · Topics'
    label_singular: 'Topic'
    folder: 'src/content/repo-topics'
    create: true
    slug: '{{slug}}'
    extension: 'json'
    format: 'json'
    identifier_field: name
    summary: '{{name}}'
    fields:
      - { name: name,        label: 'Name',           widget: string, hint: 'Display name e.g. "Humanities"' }
      - { name: slug,        label: 'Slug',           widget: string, hint: 'URL-safe id, lowercase, hyphenated. e.g. "humanities"' }
      - { name: description, label: 'Description',    widget: text, required: false }
      - { name: order,       label: 'Sort Order',     widget: number, required: false }

  # =====================================================
  # REPOSITORY — SUBTOPICS  (second level)
  # =====================================================
  - name: 'repo-subtopics'
    label: 'Repository · Subtopics'
    label_singular: 'Subtopic'
    folder: 'src/content/repo-subtopics'
    create: true
    slug: '{{slug}}'
    extension: 'json'
    format: 'json'
    identifier_field: name
    summary: '{{name}} (under {{topic}})'
    fields:
      - { name: name,        label: 'Name',           widget: string, hint: 'e.g. "Ray Peat"' }
      - { name: slug,        label: 'Slug',           widget: string, hint: 'URL-safe id. e.g. "ray-peat"' }
      - { name: topic,       label: 'Parent Topic',   widget: relation, collection: 'repo-topics', value_field: 'slug', display_fields: ['name'], search_fields: ['name','slug'] }
      - { name: description, label: 'Description',    widget: text, required: false }
      - { name: order,       label: 'Sort Order',     widget: number, required: false }

  # =====================================================
  # REPOSITORY — LINKS  (the actual entries)
  # =====================================================
  - name: 'repo-links'
    label: 'Repository · Links'
    label_singular: 'Link'
    folder: 'src/content/repo-links'
    create: true
    slug: '{{year}}-{{slug}}'
    extension: 'json'
    format: 'json'
    summary: '{{title}}'
    fields:
      - { name: title,       label: 'Title',          widget: string }
      - { name: url,         label: 'URL',            widget: string, hint: 'External link to the article, study, or book.' }
      - { name: topic,       label: 'Topic',          widget: relation, collection: 'repo-topics', value_field: 'slug', display_fields: ['name'], search_fields: ['name','slug'] }
      - { name: subtopic,    label: 'Subtopic',       widget: relation, collection: 'repo-subtopics', value_field: 'slug', display_fields: ['name'], search_fields: ['name','slug'], required: false, hint: 'Optional. If empty, the link sits directly under the topic.' }
      - { name: type,        label: 'Type',           widget: select, options: ['Article','Study','Book','Video','Podcast','Other'], default: 'Article' }
      - { name: author,      label: 'Author',         widget: string, required: false }
      - { name: year,        label: 'Year',           widget: number, required: false, value_type: int, min: 1800, max: 2100 }
      - { name: description, label: 'Description',    widget: text, required: false }
      - { name: addedAt,     label: 'Added',          widget: datetime, required: false }
