<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Sanguine — Content Manager</title>
  </head>
  <body>
    <!-- Decap CMS — visual editor for site content -->
  <!-- Netlify Identity widget — handles login + invite acceptance -->
       <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

       <!-- Decap CMS — visual editor for site content -->
       <script src="https://unpkg.com/decap-cms@^3.3.0/dist/decap-cms.js"></script>

       <!-- Redirect to /admin/ after invite acceptance -->
       <script>
         if (window.netlifyIdentity) {
           window.netlifyIdentity.on("init", user => {
             if (!user) {
               window.netlifyIdentity.on("login", () => {
                 document.location.href = "/admin/";
               });
             }
           });
         }
       </script>
     </body>
</html>
